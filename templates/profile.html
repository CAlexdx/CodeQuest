<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - CodeQuest</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Estilos específicos para a página de perfil */
        .perfil-info {
            text-align: left;
            margin: 20px 0;
            padding: 15px;
            background: #0f172a; /* Fundo um pouco mais escuro que o card */
            border-radius: 12px;
        }
        .perfil-info p {
            margin: 8px 0;
            font-size: 18px;
        }
        .user-highlight {
            color: #38bdf8;
            font-weight: bold;
        }
        .progress-container {
            background: #334155;
            border-radius: 10px;
            width: 100%;
            height: 25px;
            margin: 15px 0;
            overflow: hidden;
            border: 2px solid #1e293b;
        }
        .progress-bar {
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            width: {{ (xp % 50) * 2 }}%;
            height: 100%;
            transition: width 0.8s ease-in-out;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .btn-jogar {
            background: #3b82f6;
            color: white !important; /* Garante que o texto fique branco */
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-jogar:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="quiz"> 
        <h1>Seu Perfil</h1>

        <div class="perfil-info">
            <p>👤 <strong>Usuário:</strong> <span class="user-highlight">{{username}}</span></p>
            <p>⭐ <strong>XP Total:</strong> {{xp}}</p>
            <p>🚀 <strong>Nível:</strong> {{level}}</p>
        </div>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        <p style="font-size: 14px; color: #94a3b8;">
            {{ xp % 50 }} / 50 XP para o nível {{ level + 1 }}
        </p>

        <div class="btn-container">
            <a href="/" class="btn-jogar">Voltar ao Jogo</a>
            <a href="/logout" style="color: #ef4444; font-size: 14px; text-decoration: none;">Sair da Conta</a>
        </div>
    </div>

</body>
</html>
