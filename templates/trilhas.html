<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trilhas - CodeQuest</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="quiz" style="max-width: 640px;">
        <header>
            <h1>🗺️ Trilhas de Aprendizagem</h1>
            <a href="/">⬅ Voltar para o Início</a>
        </header>

        {% for trail in trails %}
        <div class="perfil-info" style="text-align: center; margin-top: 20px;">
            <h2>{{ trail.icon }} {{ trail.name }}</h2>
            <p>{{ trail.description }}</p>
            
            <p style="font-size: 14px; margin-top: 10px;">
                {{ trail.completed_units }}/{{ trail.total_units }} unidades
            </p>

            <div class="progress-container">
                <div class="progress-bar" 
                     style="width: {{ (trail.completed_units / trail.total_units * 100)|int if trail.total_units else 0 }}%;">
                </div>
            </div>

            <div class="btn-container">
                <a href="/trilhas/{{ trail.id }}" class="btn-jogar">Entrar</a>
            </div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
