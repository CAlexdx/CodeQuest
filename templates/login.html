<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CodeQuest</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="quiz">
        <h1>CodeQuest</h1>
        <img src="/static/logo1.png" alt="CodeQuest Logo" style="max-width: 180px; height: auto; display: block; margin: 0 auto 10px;">
        <p style="margin-bottom: 24px; font-size: 14px;">Entre na sua conta para continuar</p>

        <form method="POST">
            <input name="username"
                   type="text"
                   placeholder="Usuário"
                   maxlength="15"
                   required
                   autocomplete="username"
                   autofocus>

            <input name="password"
                   type="password"
                   placeholder="Senha"
                   maxlength="20"
                   required
                   autocomplete="current-password">

            <button type="submit">Entrar</button>
        </form>

        {% if error %}
            <p class="error-msg">{{ error }}</p>
        {% endif %}

        <p style="margin-top: 24px; font-size: 14px;">
            <a href="/register">Ainda não tem conta? Criar conta</a>
        </p>
    </div>

</body>
</html>
