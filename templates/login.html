<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CodeQuest</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="quiz"> <h1>Login</h1>

        <form method="POST">
            <input name="username" 
                   placeholder="Usuário" 
                   maxlength="15" 
                   required 
                   autocomplete="username">

            <input type="password" 
                   name="password" 
                   placeholder="Senha" 
                   maxlength="20" 
                   required 
                   autocomplete="current-password">

            <button type="submit">Entrar</button>
        </form>

        {% if error %}
            <p style="color: #ef4444; margin-top: 15px; font-weight: bold;">{{error}}</p>
        {% endif %}

        <p style="margin-top: 20px;">
            <a href="/register">Ainda não tem conta? Criar conta</a>
        </p>
    </div>

</body>
</html>
