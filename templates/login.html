<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CodeQuest</title>
    <link rel="icon" type="image/png" href="/static/logo2.png">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* 💬 BOTÃO FLUTUANTE DE FEEDBACK FIXO NO CANTO INFERIOR DIREITO */
        .feedback-float-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: linear-gradient(135deg, #a855f7, #7c3aed); /* Tom roxo/neon vivo */
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(124, 58, 237, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 9999;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .feedback-float-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.6);
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="quiz">
        
        <img src="/static/logo1.png" alt="CodeQuest Logo" style="max-width: 180px; height: auto; display: block; margin: 0 auto 10px;">
        <p style="margin-bottom: 24px; font-size: 14px;">Entre na sua conta para continuar</p>

        <form method="POST">
            <input name="username"
                   type="text"
                   placeholder="Usuário"
                   maxlength="15"
                   required
                   autocomplete="username"
                   autofocus>

            <input name="password"
                   type="password"
                   placeholder="Senha"
                   maxlength="20"
                   required
                   autocomplete="current-password">

            <button type="submit">Entrar</button>
        </form>

        {% if error %}
            <p class="error-msg">{{ error }}</p>
        {% endif %}

        <p style="margin-top: 24px; font-size: 14px;">
            <a href="/register">Ainda não tem conta? Criar conta</a>
        </p>
    </div>

    <a href="https://forms.gle/McVT3E7VctU3iFdGA" target="_blank" class="feedback-float-btn">
        💬 Feedback
    </a>

</body>
</html>
