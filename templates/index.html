<!DOCTYPE html>
<html>

<head>
<title>CodeQuest</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>CodeQuest</h1>

<div class="quiz">

<h2>{{ question["question"] }}</h2>

<input id="resposta" placeholder="Digite sua resposta">

<br><br>

<button onclick="enviar()">Responder</button>

</div>

<p id="resultado"></p>

<script>

const question_id = "{{ question['id'] }}";

function enviar(){

let resposta = document.getElementById("resposta").value

fetch("/answer",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
id:question_id,
answer:resposta
})
})

.then(res => res.json())
.then(data => {

if(data.result == "correct"){
document.getElementById("resultado").innerText = "✔ Acertou! +10 XP"
}
else{
document.getElementById("resultado").innerText = "❌ Errou!"
}

setTimeout(()=>{
location.reload()
},1500)

})

}

</script>

</body>

</html>
