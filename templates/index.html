<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeQuest</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header>
        <h1>🚀 CodeQuest</h1>
    </header>

    <div class="status-bar">
        <span class="status-item"><span class="user-name">👤 {{ username }}</span></span>
        <span class="status-item">⭐ {{ xp }} XP</span>
        <span class="status-item">🏆 Nível {{ level }}</span>
        <span class="status-item">🔥 {{ streak }}</span>
    </div>

    <div class="quiz">
        <h2>Bem-vindo de volta!</h2>
        <p style="margin-bottom: 24px;">Continue sua jornada nas trilhas de programação.</p>

        <div class="btn-container">
            <a href="/trilhas" class="btn-jogar">🗺️ Trilhas de Aprendizagem</a>
            <a href="/ranking" class="btn-jogar">🏆 Ranking Global</a>
            <a href="/profile" class="btn-jogar">👤 Meu Perfil</a>
            
            {% if session.user_id %}
            <a href="/logout" class="btn-jogar" style="background: var(--red);">🚪 Sair</a>
            {% endif %}
        </div>
    </div>

</body>
</html>
