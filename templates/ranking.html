<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🏆 Ranking Global</h1>

<div class="ranking-container">

<table>

<thead>
<tr>
<th>#</th>
<th>Usuário</th>
<th>XP</th>
<th>Nível</th>
</tr>
</thead>

<tbody>

{% for user in users %}

<tr>

<td>

{% if loop.index == 1 %}
🥇
{% elif loop.index == 2 %}
🥈
{% elif loop.index == 3 %}
🥉
{% else %}
{{ loop.index }}
{% endif %}

</td>

<td>{{ user.username }}</td>

<td>{{ user.xp }}</td>

<td>{{ user.xp // 50 }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

<br>

<a href="/" class="btn-jogar">
⬅ Voltar
</a>

</body>
</html>
