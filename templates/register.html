<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - CodeQuest</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="quiz">
        <h1>CodeQuest</h1>
        <p style="margin-bottom: 24px; font-size: 14px;">Crie sua conta gratuita</p>

        <form method="POST">
            <input name="username"
                   type="text"
                   placeholder="Usuário (máx. 15 caracteres)"
                   maxlength="15"
                   required
                   pattern="[a-zA-Z0-9]+"
                   title="Apenas letras e números, sem espaços."
                   autocomplete="username"
                   autofocus>

            <input name="password"
                   type="password"
                   placeholder="Senha (mín. 4 caracteres)"
                   maxlength="20"
                   minlength="4"
                   required
                   autocomplete="new-password">

            <button type="submit">Criar Conta</button>
        </form>

        {% if error %}
            <p class="error-msg">{{ error }}</p>
        {% endif %}

        <p style="margin-top: 24px; font-size: 14px;">
            <a href="/login">Já tem uma conta? Entrar</a>
        </p>
    </div>

</body>
</html>
